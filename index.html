<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>allover.art — мокап олл-овер (фронт)</title>
<style>
  :root{--bg:#0b0d12;--fg:#e8ecf3;--mut:#7d8597;--ok:#2ecc71}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
    font:16px/1.5 -apple-system,Segoe UI,Roboto,Inter,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#15203a,var(--bg));color:var(--fg)}
  .card{max-width:560px;width:100%;padding:20px;border:1px solid #1e2636;border-radius:18px;
    background:#10141d;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .live{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ok);
    border:1px solid #1c3a2a;background:#0e1c14;padding:5px 11px;border-radius:999px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:p 1.8s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(46,204,113,.6)}70%{box-shadow:0 0 0 10px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}
  h1{margin:16px 0 4px;font-size:21px}
  p{margin:0 0 14px;color:var(--mut);font-size:14px}
  .ph{margin:12px 0;border-radius:14px;overflow:hidden;border:1px solid #1c2434}
  .ph img{display:block;width:100%;height:auto}
  .meta{font-size:12.5px;color:var(--mut)} .meta b{color:var(--fg)}
  a{color:#5b8cff;text-decoration:none}
</style></head><body>
  <main class="card">
    <span class="live"><span class="dot"></span>LIVE · мокап собран автоматически</span>
    <h1>Олл-овер принт · фронт 👕🔥</h1>
    <p>Принт натянут на футболку как all-over: маска ткани (модель/фон разделены), тени и складки сохранены, края чистые. Это первый проход — фронт.</p>
    <div class="ph"><img src="front-mockup.jpg" alt="Олл-овер принт, фронт"></div>
    <div class="meta">
      <div>Прямая ссылка: <a href="front-mockup.jpg">/front-mockup.jpg</a></div>
      <div>Хостинг: <b>GitHub Pages</b> · обновлено: <b>2026-06-30 17:09 +05</b></div>
    </div>
  </main>
</body></html>
